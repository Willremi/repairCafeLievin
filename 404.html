<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page non trouvée - 404</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #ff9b2f;
        }

        p {
            font-size: 18px;
            margin: 15px 0 30px;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 25px;
            background-color: #ff9b2f;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            transition: background 0.3s ease;
        }

        .btn-home:hover {
            background-color: #e68a1f;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>404</h1>
        <p>Oups… La page que vous cherchez n’existe pas.</p>

        <a href="/index.html" class="btn-home">Retour à l’accueil</a>
    </div>
</body>
</html>
